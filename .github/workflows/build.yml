name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-matrix:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: centos8
            runner: ubuntu-latest
            mode: pyinstaller-linux
            container: oraclelinux:8
          - target: centos9
            runner: ubuntu-latest
            mode: pyinstaller-linux
            container: oraclelinux:9
          - target: ubuntu22
            runner: ubuntu-latest
            mode: pyinstaller-linux
            container: ubuntu:22.04
          - target: ubuntu24
            runner: ubuntu-latest
            mode: pyinstaller-linux
            container: ubuntu:24.04
          - target: Windows
            runner: windows-latest
            mode: pyinstaller-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python (Linux container)
        if: matrix.mode == 'pyinstaller-linux'
        run: |
          echo "PYTHON_BIN=python3" >> "$GITHUB_ENV"
          if command -v apt-get &>/dev/null; then
            apt-get update -y && apt-get install -y python3 python3-pip binutils
            # --break-system-packages only exists in pip >= 23.1 (Ubuntu 24+)
            BPS=$(pip3 install --help 2>&1 | grep -q break-system-packages && echo "--break-system-packages" || echo "")
            python3 -m pip install $BPS -r requirements.txt pytest
          elif command -v dnf &>/dev/null; then
            if rpm -E '%{rhel}' | grep -q '^8$'; then
              dnf install -y python39 python39-pip binutils
              echo "PYTHON_BIN=python3.9" >> "$GITHUB_ENV"
              PYTHON_BIN=python3.9
            else
              dnf install -y python3 python3-pip binutils
              PYTHON_BIN=python3
            fi
            "$PYTHON_BIN" -m pip install -r requirements.txt pytest
          else
            yum install -y python3 python3-pip binutils
            python3 -m pip install -r requirements.txt pytest
          fi

      - name: Set up Python
        if: matrix.mode != 'pyinstaller-linux'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        if: matrix.mode != 'pyinstaller-linux'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run Python tests
        shell: bash
        run: |
          ${PYTHON_BIN:-python3} -m pytest -q test/test_python_cli.py test/test_json_outputs.py test/test_dx_get_scripts.py 2>/dev/null || \
          pytest -q test/test_python_cli.py test/test_json_outputs.py test/test_dx_get_scripts.py

      - name: Build Python binaries (Linux)
        if: matrix.mode == 'pyinstaller-linux'
        shell: bash
        run: |
          mkdir -p dist/linux
          for script in bin/*.py; do
            ${PYTHON_BIN:-python3} -m PyInstaller --onefile \
              --paths lib/py \
              --distpath dist/linux \
              --workpath build/pyinstaller/linux \
              --specpath build/pyinstaller/linux \
              "$script"
          done
          tar -czf "dxtoolkit2-ci-${{ matrix.target }}-installer.tar.gz" -C dist/linux .

      - name: Build Python binaries (Windows)
        if: matrix.mode == 'pyinstaller-windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/windows, build/pyinstaller/windows | Out-Null
          Get-ChildItem bin\*.py | ForEach-Object {
            python -m PyInstaller --onefile `
              --paths lib/py `
              --distpath dist/windows `
              --workpath build/pyinstaller/windows `
              --specpath build/pyinstaller/windows `
              $_.FullName
          }
          Compress-Archive -Path dist/windows/* -DestinationPath "dxtoolkit2-ci-Windows-installer.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: |
            dxtoolkit2-ci-*.tar.gz
            dxtoolkit2-ci-*.zip
          if-no-files-found: error
