name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-assets:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: centos8
            runner: ubuntu-latest
            mode: pyinstaller-linux
            container: oraclelinux:8
            asset_suffix: redhat8-installer.tar.gz
          - target: centos9
            runner: ubuntu-latest
            mode: pyinstaller-linux
            container: oraclelinux:9
            asset_suffix: redhat9-installer.tar.gz
          - target: ubuntu22
            runner: ubuntu-latest
            mode: pyinstaller-linux
            container: ubuntu:22.04
            asset_suffix: ubuntu2204-installer.tar.gz
          - target: ubuntu24
            runner: ubuntu-latest
            mode: pyinstaller-linux
            container: ubuntu:24.04
            asset_suffix: ubuntu2404-installer.tar.gz
          - target: Windows
            runner: windows-latest
            mode: pyinstaller-windows
            asset_suffix: win64-installer.zip
          - target: osx-m1
            runner: macos-14
            mode: pyinstaller-macos
            platform: osx-m1
            asset_suffix: osx-m1.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python (Linux container)
        if: matrix.mode == 'pyinstaller-linux'
        run: |
          echo "PYTHON_BIN=python3" >> "$GITHUB_ENV"
          if command -v apt-get &>/dev/null; then
            apt-get update -y && apt-get install -y python3 python3-pip binutils
            BPS=$(pip3 install --help 2>&1 | grep -q break-system-packages && echo "--break-system-packages" || echo "")
            python3 -m pip install $BPS -r requirements.txt
          elif command -v dnf &>/dev/null; then
            if rpm -E '%{rhel}' | grep -q '^8$'; then
              dnf install -y python39 python39-pip binutils
              echo "PYTHON_BIN=python3.9" >> "$GITHUB_ENV"
              PYTHON_BIN=python3.9
            else
              dnf install -y python3 python3-pip binutils
              PYTHON_BIN=python3
            fi
            "$PYTHON_BIN" -m pip install -r requirements.txt
          else
            yum install -y python3 python3-pip binutils
            python3 -m pip install -r requirements.txt
          fi

      - name: Set up Python
        if: matrix.mode != 'pyinstaller-linux'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        if: matrix.mode != 'pyinstaller-linux'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build and package (Linux)
        if: matrix.mode == 'pyinstaller-linux'
        shell: bash
        run: |
          asset="dxtoolkit2-${GITHUB_REF_NAME}-${{ matrix.asset_suffix }}"
          mkdir -p dist/linux
          for script in bin/*.py; do
            ${PYTHON_BIN:-python3} -m PyInstaller --onefile \
              --paths lib/py \
              --distpath dist/linux \
              --workpath build/pyinstaller/linux \
              --specpath build/pyinstaller/linux \
              "$script"
          done
          tar -czf "$asset" -C dist/linux .

      - name: Build and package (macOS)
        if: matrix.mode == 'pyinstaller-macos'
        shell: bash
        run: |
          asset="dxtoolkit2-${GITHUB_REF_NAME}-${{ matrix.asset_suffix }}"
          mkdir -p "dist/${{ matrix.platform }}" "build/pyinstaller/${{ matrix.platform }}"
          for script in bin/*.py; do
            python -m PyInstaller --onefile \
              --paths lib/py \
              --distpath "dist/${{ matrix.platform }}" \
              --workpath "build/pyinstaller/${{ matrix.platform }}" \
              --specpath "build/pyinstaller/${{ matrix.platform }}" \
              "$script"
          done
          tar -czf "$asset" -C "dist/${{ matrix.platform }}" .

      - name: Build and package (Windows)
        if: matrix.mode == 'pyinstaller-windows'
        shell: pwsh
        run: |
          $asset = "dxtoolkit2-$env:GITHUB_REF_NAME-${{ matrix.asset_suffix }}"
          New-Item -ItemType Directory -Force dist/windows, build/pyinstaller/windows | Out-Null
          Get-ChildItem bin\*.py | ForEach-Object {
            python -m PyInstaller --onefile `
              --paths lib/py `
              --distpath dist/windows `
              --workpath build/pyinstaller/windows `
              --specpath build/pyinstaller/windows `
              $_.FullName
          }
          Compress-Archive -Path dist/windows/* -DestinationPath $asset

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dxtoolkit2-${{ github.ref_name }}-${{ matrix.asset_suffix }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    needs: build-release-assets
    runs-on: ubuntu-latest

    steps:
      - name: Download all packaged assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            release-assets/**/*.tar.gz
            release-assets/**/*.zip
